name: EPDE Core Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: pytest (${{ matrix.python-version }}) / ${{ matrix.split }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
        operator: ["L2LRFitness"]
        split: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install torch
          pip install pytest-xdist pytest-split pytest-timeout
          echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: Run split tests
        run: |
          pytest tests/functional/ \
            --splits 4 --group ${{ matrix.split }} \
            --durations=20 \
            --timeout=600 \
            -m "not slow" \
            --operators ${{ matrix.operator }}
