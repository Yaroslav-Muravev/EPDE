# KdV with cos(t)*sin(x) source term (1+1D PDE)
#   du/dx0 = -6*u*du/dx1 - d^3u/dx1^3 + cos(t)*sin(x)
# Data: data.csv (loaded via np.loadtxt)
name: kdv_cossin
truth_equations:
  - "-6.0 * du/dx1{power: 1.0} * u{power: 1.0} + -1.0 * d^3u/dx1^3{power: 1.0} + 1.0 * cos(t)sin(x){power: 1.0} = du/dx0{power: 1.0}"
