name: EPDE Discovery (slow) tests

on:
  workflow_dispatch:

jobs:
  discovery:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
        operator: ["DeepXDEBasedFitness", "PIC", "L2LRFitness"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: Run discovery tests
        run: |
          pytest tests/functional/ -m functional \
            --discovery --report \
            --operators ${{ matrix.operator }} \
            --ignore=tests/functional/tests/test_ns.py \
            --timeout=3600

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-${{ matrix.operator }}
          path: reports/
